# fly.toml app configuration file generated for acr-next-sanity on 2026-05-20T20:11:51-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'acr-next-sanity'
primary_region = 'ord'

[build]
dockerfile = 'Dockerfile'
ignorefile = 'Dockerfile.dockerignore'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
