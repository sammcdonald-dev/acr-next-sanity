name: Deploy to Fly.io

on:
  push:
    branches:
      - main
      - staging

jobs:
  deploy:
    name: Deploy ${{ github.ref_name }}
    runs-on: ubuntu-latest
    concurrency: deploy-${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to production
        if: github.ref_name == 'main'
        run: |
          flyctl deploy --remote-only --app acr-next-sanity \
            --build-arg NEXT_PUBLIC_SANITY_PROJECT_ID=${{ vars.NEXT_PUBLIC_SANITY_PROJECT_ID }} \
            --build-arg NEXT_PUBLIC_SANITY_DATASET=${{ vars.NEXT_PUBLIC_SANITY_DATASET }} \
            --build-arg NEXT_PUBLIC_SANITY_API_VERSION=${{ vars.NEXT_PUBLIC_SANITY_API_VERSION }} \
            --build-arg NEXT_PUBLIC_SANITY_STUDIO_URL=${{ vars.NEXT_PUBLIC_SANITY_STUDIO_URL }} \
            --build-arg NEXT_PUBLIC_SITE_URL=${{ vars.NEXT_PUBLIC_SITE_URL }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy to staging
        if: github.ref_name == 'staging'
        run: |
          flyctl deploy --remote-only --app acr-next-sanity-staging \
            --build-arg NEXT_PUBLIC_SANITY_PROJECT_ID=${{ vars.NEXT_PUBLIC_SANITY_PROJECT_ID }} \
            --build-arg NEXT_PUBLIC_SANITY_DATASET=${{ vars.NEXT_PUBLIC_SANITY_DATASET }} \
            --build-arg NEXT_PUBLIC_SANITY_API_VERSION=${{ vars.NEXT_PUBLIC_SANITY_API_VERSION }} \
            --build-arg NEXT_PUBLIC_SANITY_STUDIO_URL=${{ vars.NEXT_PUBLIC_SANITY_STUDIO_URL }} \
            --build-arg NEXT_PUBLIC_SITE_URL=${{ vars.NEXT_PUBLIC_SITE_URL }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
